name: Nightly QC Run

on:
  schedule:
    - cron: "0 3 * * *"   # 3am UTC every night (after npm poll at 2am)
  workflow_dispatch:       # manual trigger for testing

jobs:
  generate:
    name: Select candidates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.ids.outputs.matrix }}
      count: ${{ steps.ids.outputs.count }}

    env:
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect candidate IDs
        id: ids
        run: |
          # Suppress [feed] log lines — only the final JSON goes to the output var
          MATRIX=$(python3 scripts/qc_feed.py --list-only --batch-size 200 2>&1 \
            | grep --line-buffered -v '^\[feed\]' | tail -1)
          COUNT=$(echo "$MATRIX" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Selected $COUNT servers for tonight's QC run"

      - name: Write candidate summary
        run: |
          echo "## Nightly QC — $(date -u '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "**Candidates selected:** ${{ steps.ids.outputs.count }}" >> $GITHUB_STEP_SUMMARY

  qc:
    name: QC — ${{ matrix.server_id }}
    needs: generate
    if: ${{ needs.generate.outputs.count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        server_id: ${{ fromJSON(needs.generate.outputs.matrix) }}

    env:
      TOOLIDX_API_KEY: ${{ secrets.TOOLIDX_API_KEY }}
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"
      CI_PLATFORM: github

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch install command
        id: fetch
        run: |
          DATA=$(curl -s --max-time 15 "$TOOLIDX_BASE/v1/servers/${{ matrix.server_id }}")
          INSTALL_CMD=$(echo "$DATA" | jq -r '.result.install_command // .install_command // empty')
          if [ -z "$INSTALL_CMD" ]; then
            echo "::error::No install_command for ${{ matrix.server_id }}"
            exit 1
          fi
          echo "install_cmd=$INSTALL_CMD" >> "$GITHUB_OUTPUT"

      - name: Run QC
        run: |
          python3 scripts/qc_test_single.py \
            --install-cmd "${{ steps.fetch.outputs.install_cmd }}" \
            --server-id "${{ matrix.server_id }}" \
            --patch

  report:
    name: Nightly Summary
    needs: [generate, qc]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TOOLIDX_BASE: https://toolidx.dev

    steps:
      - name: Fetch and print results
        run: |
          MATRIX='${{ needs.generate.outputs.matrix }}'
          COUNT=${{ needs.generate.outputs.count }}

          if [ "$COUNT" = "0" ]; then
            echo "Nothing to test tonight." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          PASSED=0; FAILED=0; ERROR=0; OTHER=0
          TABLE="| Server | QC Status | Tools |\n|--------|-----------|-------|\n"

          for sid in $(echo "$MATRIX" | python3 -c "import sys,json; [print(x) for x in json.load(sys.stdin)]"); do
            DATA=$(curl -s --max-time 10 "$TOOLIDX_BASE/v1/servers/$sid")
            STATUS=$(echo "$DATA" | jq -r '.result.qc_status // "unknown"')
            TOOLS=$(echo "$DATA" | jq -r '.result.tool_count // "-"')
            TABLE+="| $sid | $STATUS | $TOOLS |\n"
            case "$STATUS" in
              passed) PASSED=$((PASSED+1)) ;;
              failed) FAILED=$((FAILED+1)) ;;
              error)  ERROR=$((ERROR+1)) ;;
              *)      OTHER=$((OTHER+1)) ;;
            esac
          done

          {
            echo "## Nightly QC Results — $(date -u '+%Y-%m-%d')"
            echo ""
            echo "| Passed | Failed | Error | Other |"
            echo "|--------|--------|-------|-------|"
            echo "| $PASSED | $FAILED | $ERROR | $OTHER |"
            echo ""
            printf "$TABLE"
          } >> $GITHUB_STEP_SUMMARY
