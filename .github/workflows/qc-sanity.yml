name: QC Sanity Run

on:
  workflow_dispatch:

jobs:
  qc:
    name: QC — ${{ matrix.server_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        server_id:
          - github-com-1mcp-app-agent
          - github-com-preflight-dev-preflight
          - github-com-n24q02m-better-email-mcp
          - github-com-furey-mongodb-lens
          - github-com-gannonh-firebase-mcp
          - github-com-gigamori-mcp-run-sql-connectorx
          - github-com-greptimeteam-greptimedb-mcp-server
          - github-com-henilcalagiya-google-sheets-mcp
          - github-com-hydrolix-mcp-hydrolix
          - github-com-idoru-influxdb-mcp-server

    env:
      TOOLIDX_API_KEY: ${{ secrets.TOOLIDX_API_KEY }}
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch install command
        id: fetch
        run: |
          DATA=$(curl -s --max-time 15 "$TOOLIDX_BASE/v1/servers/${{ matrix.server_id }}")
          INSTALL_CMD=$(echo "$DATA" | jq -r '.result.install_command // .install_command // empty')
          if [ -z "$INSTALL_CMD" ]; then
            echo "::error::No install_command for ${{ matrix.server_id }}"
            exit 1
          fi
          echo "install_cmd=$INSTALL_CMD" >> "$GITHUB_OUTPUT"

      - name: Run QC
        run: |
          python3 scripts/qc_test_single.py \
            --install-cmd "${{ steps.fetch.outputs.install_cmd }}" \
            --server-id "${{ matrix.server_id }}" \
            --patch

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: qc
    if: always()

    env:
      TOOLIDX_BASE: https://toolidx.dev

    steps:
      - name: Print results
        run: |
          SERVERS=(
            github-com-1mcp-app-agent
            github-com-preflight-dev-preflight
            github-com-n24q02m-better-email-mcp
            github-com-furey-mongodb-lens
            github-com-gannonh-firebase-mcp
            github-com-gigamori-mcp-run-sql-connectorx
            github-com-greptimeteam-greptimedb-mcp-server
            github-com-henilcalagiya-google-sheets-mcp
            github-com-hydrolix-mcp-hydrolix
            github-com-idoru-influxdb-mcp-server
          )
          printf "\n%-50s %-8s %5s\n" "SERVER" "STATUS" "TOOLS"
          printf '%0.s-' {1..67} && echo
          for sid in "${SERVERS[@]}"; do
            DATA=$(curl -s --max-time 10 "$TOOLIDX_BASE/v1/servers/$sid")
            STATUS=$(echo "$DATA" | jq -r '.result.qc_status // "unknown"')
            TOOLS=$(echo "$DATA" | jq -r '.result.tool_count // 0')
            printf "%-50s %-8s %5s\n" "$sid" "$STATUS" "$TOOLS"
          done
