name: QC Sanity Run

on:
  workflow_dispatch:
    inputs:
      server_ids:
        description: 'JSON array of server IDs to test'
        required: true
        type: string

jobs:
  qc:
    name: QC — ${{ matrix.server_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        server_id: ${{ fromJSON(github.event.inputs.server_ids) }}

    env:
      TOOLIDX_API_KEY: ${{ secrets.TOOLIDX_API_KEY }}
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"
      CI_PLATFORM: github

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch install command
        id: fetch
        run: |
          DATA=$(curl -s --max-time 15 "$TOOLIDX_BASE/v1/servers/${{ matrix.server_id }}")
          INSTALL_CMD=$(echo "$DATA" | jq -r '.result.install_command // .install_command // empty')
          if [ -z "$INSTALL_CMD" ]; then
            echo "::error::No install_command for ${{ matrix.server_id }}"
            exit 1
          fi
          echo "install_cmd=$INSTALL_CMD" >> "$GITHUB_OUTPUT"

      - name: Run QC
        run: |
          python3 scripts/qc_test_single.py \
            --install-cmd "${{ steps.fetch.outputs.install_cmd }}" \
            --server-id "${{ matrix.server_id }}" \
            --patch
