name: QC Coordinator

# Runs a batch of servers, then re-triggers itself if the queue still has candidates.
# Creates a self-chaining pipeline that runs at full platform capacity until empty.
# Kickstarted nightly by cron; also triggered by npm poll and server submissions.

on:
  schedule:
    - cron: "0 3 * * *"   # daily kickstart — ensures the chain restarts even if it stalled
  workflow_dispatch:       # manual trigger, called by self-chain and external triggers

permissions:
  actions: write           # required for self-dispatch

concurrency:
  group: qc-coordinator
  cancel-in-progress: false  # queue a new run rather than cancel the in-progress batch

jobs:
  # ── 1. Select the next batch ──────────────────────────────────────────────
  generate:
    name: Select candidates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.ids.outputs.matrix }}
      count: ${{ steps.ids.outputs.count }}

    env:
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect candidate IDs
        id: ids
        run: |
          # qc_feed.py --list-only prints [feed] logs to stderr, JSON to stdout
          MATRIX=$(python3 scripts/qc_feed.py --list-only --batch-size 200 2>&1 \
            | grep -v '^\[feed\]' | tail -1)
          if [ -z "$MATRIX" ] || [ "$MATRIX" = "[]" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "Queue empty — coordinator will idle until next cron."
          else
            COUNT=$(echo "$MATRIX" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Selected $COUNT servers for this batch."
          fi

  # ── 2. Run QC jobs in parallel ────────────────────────────────────────────
  qc:
    name: QC — ${{ matrix.server_id }}
    needs: generate
    if: needs.generate.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        server_id: ${{ fromJSON(needs.generate.outputs.matrix) }}

    env:
      TOOLIDX_API_KEY: ${{ secrets.TOOLIDX_API_KEY }}
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"
      CI_PLATFORM: github

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Fetch install command
        id: fetch
        run: |
          DATA=$(curl -s --max-time 15 "$TOOLIDX_BASE/v1/servers/${{ matrix.server_id }}")
          INSTALL_CMD=$(echo "$DATA" | jq -r '.result.install_command // .install_command // empty')
          if [ -z "$INSTALL_CMD" ]; then
            echo "::error::No install_command for ${{ matrix.server_id }}"
            exit 1
          fi
          echo "install_cmd=$INSTALL_CMD" >> "$GITHUB_OUTPUT"

      - name: Run QC
        run: |
          python3 scripts/qc_test_single.py \
            --install-cmd "${{ steps.fetch.outputs.install_cmd }}" \
            --server-id "${{ matrix.server_id }}" \
            --patch

  # ── 3. Summarise and re-trigger if more work remains ─────────────────────
  chain:
    name: Report + continue
    needs: [generate, qc]
    if: always() && needs.generate.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      TOOLIDX_BASE: https://toolidx.dev
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Write batch summary
        run: |
          MATRIX='${{ needs.generate.outputs.matrix }}'
          PASSED=0; FAILED=0; ERROR=0; OTHER=0
          TABLE="| Server | Status | Tools |\n|--------|--------|-------|\n"

          for sid in $(echo "$MATRIX" | python3 -c "import sys,json; [print(x) for x in json.load(sys.stdin)]"); do
            DATA=$(curl -s --max-time 10 "$TOOLIDX_BASE/v1/servers/$sid")
            STATUS=$(echo "$DATA" | jq -r '.result.qc_status // "unknown"')
            TOOLS=$(echo "$DATA" | jq -r '.result.tool_count // "-"')
            TABLE+="| $sid | $STATUS | $TOOLS |\n"
            case "$STATUS" in
              passed) PASSED=$((PASSED+1)) ;;
              failed) FAILED=$((FAILED+1)) ;;
              error)  ERROR=$((ERROR+1)) ;;
              *)      OTHER=$((OTHER+1)) ;;
            esac
          done

          {
            echo "## QC Batch — $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Passed | Failed | Error | Other |"
            echo "|--------|--------|-------|-------|"
            echo "| $PASSED | $FAILED | $ERROR | $OTHER |"
            echo ""
            printf "$TABLE"
          } >> $GITHUB_STEP_SUMMARY

      - name: Check queue and continue if not empty
        run: |
          # Count remaining candidates across all priority tiers
          PENDING=$(curl -s "$TOOLIDX_BASE/v1/servers?status=active&qc_status=pending&limit=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('total',0))")
          echo "Remaining pending: $PENDING"

          if [ "$PENDING" -gt 0 ]; then
            echo "Queue not empty — triggering next batch."
            gh workflow run qc-coordinator.yml \
              --repo ${{ github.repository }} \
              --ref ${{ github.ref_name }}
          else
            echo "Queue empty — coordinator going idle. Next kickstart: 3am UTC."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
